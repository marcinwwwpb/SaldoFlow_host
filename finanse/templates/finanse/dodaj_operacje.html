{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Dodaj pozycję w budżecie</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<img src="{% static 'img/pb_logo.png' %}" height="40">

<span class="navbar-brand ms-3">
Budżet domowy
</span>

<a href="{% url 'lista_miesiecy' %}" class="btn btn-outline-light">Powrót</a>

</div>

</nav>

<div class="container mt-5">

<div class="container-box">

<h2>Dodaj pozycję w budżecie</h2>

<form method="post">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Tytuł</label>
{{ form.tytul }}
</div>

<div class="mb-3">
<label class="form-label">Kwota</label>
{{ form.kwota }}
</div>

<div class="mb-3">
<label class="form-label">Data</label>
{{ form.data }}
</div>

<div class="mb-3">
<label class="form-label">Typ operacji</label>
{{ form.typ_operacji }}
</div>

<div class="mb-3">
<label class="form-label">Kategoria</label>
{{ form.kategoria }}
</div>

<div class="mb-3">
<label class="form-label">Tagi</label>
{{ form.tagi }}
</div>

<div class="mb-3">
<label class="form-label">Opis</label>
{{ form.opis }}
</div>

<button class="btn btn-success">Zapisz</button>

<a href="{% url 'lista_miesiecy' %}" class="btn btn-secondary">Anuluj</a>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/pl.js"></script>

<script>

flatpickr("#datepicker", {

dateFormat: "d-m-Y",

defaultDate: "today",

locale: "pl"

});

</script>

</body>
</html>
