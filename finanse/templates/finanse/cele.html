<!DOCTYPE html>
<html>

<head>

<title>Cele oszczędnościowe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h2>Cel oszczędnościowy na {{ rok }}</h2>

<form method="post">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Kwota celu (PLN)
</label>

<input
type="number"
step="0.01"
name="kwota"
class="form-control"
required
>

</div>

<button class="btn btn-success">

Zapisz cel

</button>

</form>


<hr>


<h3>Poprzednie cele</h3>


{% for c in cele %}

<h5>{{ c.rok }}</h5>

<div class="progress mb-3">

<div
class="progress-bar"
style="width: {{ c.procent }}%"
>

{{ c.oszczednosci|floatformat:2 }}
/ {{ c.cel|floatformat:2 }} PLN
({{ c.procent }}%)

</div>

</div>

{% endfor %}

</body>
</html>
