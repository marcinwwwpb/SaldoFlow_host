services:
  oracle:
    image: gvenzl/oracle-free:latest
    container_name: saldoflow-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: "oracle"
      APP_USER: "SALDOFLOW_APP"
      APP_USER_PASSWORD: "change-me"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  oracle-data:
